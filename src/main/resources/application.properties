# PostgreSQL admin connection
db.admin.url=${DB_ADMIN_URL:jdbc:postgresql://localhost:5432/postgres}
db.admin.user=${DB_ADMIN_USER:postgres}
db.admin.password=${DB_ADMIN_PASSWORD:postgres}

# Teacher connection
db.teacher.user=${DB_TEACHER_USER:teacher_role}
db.teacher.password=${DB_TEACHER_PASSWORD:teacher_pass}

# Teacher secret for login
teacher.secret=${TEACHER_SECRET:teacher123}

# Security limits
db.query.timeout=${QUERY_TIMEOUT:30}
db.max.rows=${MAX_ROWS:1000}