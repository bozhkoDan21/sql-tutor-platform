# PostgreSQL admin connection
db.admin.url=jdbc:postgresql://postgres:5432/postgres
db.admin.user=postgres
db.admin.password=${DB_ADMIN_PASSWORD:-postgres}

# Teacher connection
db.teacher.user=teacher_role
db.teacher.password=teacher_pass

# Teacher secret for login
teacher.secret=${TEACHER_SECRET:-teacher123}

# Security limits
db.query.timeout=3
db.max.rows=1000