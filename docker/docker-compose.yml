services:
  postgres:
    build:
      context: ..
      dockerfile: docker/Dockerfile.postgres
    container_name: sql_trainer_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:-postgres}
      TZ: Europe/Moscow
      PGTZ: Europe/Moscow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sql_trainer_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_ADMIN_USER: ${DB_ADMIN_USER:-postgres}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD:-postgres}
      DB_TEACHER_USER: ${DB_TEACHER_USER:-teacher_role}
      DB_TEACHER_PASSWORD: ${DB_TEACHER_PASSWORD:-teacher_pass}
      DB_STUDENT_USER: ${DB_STUDENT_USER:-students}
      DB_STUDENT_PASSWORD: ${DB_STUDENT_PASSWORD:-student_pass}
      TEACHER_SECRET: ${TEACHER_SECRET:-teacher123}
      JWT_SECRET: ${JWT_SECRET:-sql-trainer-super-secret-key-2024-must-be-at-least-256-bits-long}
      QUERY_TIMEOUT_SEC: ${QUERY_TIMEOUT_SEC:-3}
      MAX_ROWS: ${MAX_ROWS:-1000}
      CONNECTION_TIMEOUT_MS: ${CONNECTION_TIMEOUT_MS:-5000}
      JWT_ACCESS_TOKEN_EXPIRY_HOURS: ${JWT_ACCESS_TOKEN_EXPIRY_HOURS:-1}
      JWT_REFRESH_TOKEN_EXPIRY_DAYS: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
      JWT_INACTIVE_TIMEOUT_HOURS: ${JWT_INACTIVE_TIMEOUT_HOURS:-3}
      MAX_CONCURRENT_QUERIES: ${MAX_CONCURRENT_QUERIES:-10}
      SEMAPHORE_TIMEOUT_SEC: ${SEMAPHORE_TIMEOUT_SEC:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JAVA_OPTS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      LANG: "ru_RU.UTF-8"
      LC_ALL: "ru_RU.UTF-8"
      TZ: Europe/Moscow
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes:
  postgres_data:
    name: sql_trainer_postgres_data